services:
  postgres:
    image: postgres:15-alpine
    container_name: twinmind-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: twinmind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twinmind"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: twinmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: twinmind-backend
    environment:
      NODE_ENV: development
      PORT: "3001"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: twinmind
      DB_USER: postgres
      DB_PASSWORD: postgres123
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      AI_SERVICE_URL: http://ai-service:5000
      JWT_ACCESS_SECRET: twinmind-access-jwt-secret-2024-change-in-prod
      JWT_REFRESH_SECRET: twinmind-refresh-jwt-secret-2024-change-in-prod
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      CORS_ORIGINS: "http://localhost:5173,http://localhost:5174,http://frontend:5173"
      ENABLE_SIMULATOR: "true"
      SIMULATOR_INTERVAL: "5000"
      UPLOAD_DIR: /app/uploads
    ports:
      - "3001:3001"
    volumes:
      - shared-uploads:/app/uploads
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: twinmind-ai
    environment:
      PORT: "5000"
      DEBUG: "false"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: twinmind
      DB_USER: postgres
      DB_PASSWORD: postgres123
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OLLAMA_HOST: "http://host.docker.internal:11434"
      OLLAMA_MODEL: "llama3.2:3b"
      FAISS_INDEX_PATH: /app/faiss_index
      MODELS_PATH: /app/saved_models
      EMBEDDING_MODEL: all-MiniLM-L6-v2
    ports:
      - "5000:5000"
    volumes:
      - faiss-storage:/app/faiss_index
      - models-storage:/app/saved_models
      - shared-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: twinmind-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001/api/v1
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  shared-uploads:
  faiss-storage:
  models-storage:
